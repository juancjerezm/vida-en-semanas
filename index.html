<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vida en Semanas</title>
<style>
  :root {
    --bg:      oklch(99% 0.002 240);
    --surface: oklch(100% 0 0);
    --fg:      oklch(18% 0.012 250);
    --muted:   oklch(54% 0.012 250);
    --border:  oklch(92% 0.005 250);
    --accent:  oklch(15% 0 0);
    --accent-subtle: oklch(95% 0.025 255);
    --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100dvh;
  }

  .screen { display: none; min-height: 100dvh; }
  .screen.active { display: flex; }

  /* ====== Screen 1 — Input ====== */
  .screen-input {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(1.5rem, 4vw, 3rem) 1.5rem;
    gap: clamp(1.5rem, 3vw, 2.5rem);
  }

  .calendar-icon {
    width: 48px;
    height: 52px;
    border: 2px solid var(--fg);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .calendar-icon-top {
    background: var(--fg);
    height: 14px;
  }

  .calendar-icon-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--fg);
  }

  .input-header { text-align: center; max-width: 540px; }

  .input-header h1 {
    font-family: var(--font-display);
    font-size: clamp(26px, 4.5vw, 42px);
    font-weight: 650;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--fg);
    margin-bottom: 0.75rem;
  }

  .input-header p {
    font-size: clamp(14px, 1.6vw, 16px);
    color: var(--muted);
    line-height: 1.6;
  }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: clamp(1.5rem, 3vw, 2rem);
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .field { display: flex; flex-direction: column; gap: 0.375rem; }

  .field label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input[type="date"] {
    padding: 0.85rem 0.875rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: var(--font-body);
    color: var(--fg);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    text-align: center;
  }

  .field input:focus {
    border-color: var(--fg);
  }

  .btn-primary {
    width: 100%;
    padding: 0.95rem 1.5rem;
    background: var(--fg);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.985); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
    line-height: 1.6;
  }

  /* ====== Screen 2 — Results ====== */
  .screen-results {
    flex-direction: column;
    max-width: 960px;
    margin: 0 auto;
    padding: clamp(1rem, 3vw, 2rem) clamp(1rem, 3vw, 1.5rem);
    gap: 1.5rem;
  }

  .results-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .results-top h2 {
    font-family: var(--font-display);
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }

  .results-top h2 .name-highlight { color: var(--fg); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 6px; }

  .user-context {
    font-size: 14px;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.5rem 0.875rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font-body);
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-back:hover { border-color: var(--fg); color: var(--fg); }

  /* ====== Fun Stats ====== */
  .fun-stats-section {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }

  .fun-stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
    transition: border-color 0.2s;
  }

  .fun-stat-card:hover { border-color: var(--fg); }

  .fun-stat-icon {
    font-size: 20px;
    line-height: 1;
  }

  .fun-stat-value {
    font-family: var(--font-mono);
    font-size: clamp(18px, 2.2vw, 24px);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
  }

  .fun-stat-label {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ====== Stats Row ====== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: clamp(0.875rem, 2vw, 1.125rem) clamp(0.75rem, 1.5vw, 1rem);
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    line-height: 1.15;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 0.25rem;
    line-height: 1.4;
  }

  /* ====== Grid ====== */
  .grid-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .grid-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.25rem 0.75rem;
  }

  .grid-card-title { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
  .grid-card-subtitle { font-size: 12px; color: var(--muted); }

  .life-grid-wrapper {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    padding: 0 0.5rem 0.75rem 0.5rem;
  }

  .year-labels {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-top: 0;
    flex-shrink: 0;
  }

  .year-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    text-align: right;
    width: 28px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .life-grid {
    display: grid;
    grid-template-columns: repeat(52, 1fr);
    gap: 1px;
    flex: 1;
    max-width: 480px;
  }

  @media (max-width: 700px) { .life-grid { max-width: 360px; } }
  @media (max-width: 420px) { .life-grid { max-width: 280px; } }

  .life-cell {
    aspect-ratio: 1;
    border-radius: 2px;
    transition: transform 0.1s;
    cursor: default;
  }

  .life-cell.lived   { background: var(--fg); }
  .life-cell.current { background: var(--fg); outline: 2px solid var(--fg); outline-offset: 2px; border-radius: 3px; position: relative; z-index: 1; }
  .life-cell.future  { background: var(--border); }

  .life-cell:hover { transform: scale(1.8); z-index: 2; }

  .legend {
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    padding: 0.75rem 1.25rem 1rem;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .year-labels { display: none; }
  }

  @media (max-width: 420px) {
    .stats-row { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .fun-stats-section { grid-template-columns: 1fr; }
    .results-top { flex-direction: column; }
    .btn-back { align-self: flex-start; }
  }

  /* Desktop: 4 columns (8 cards = 2 rows perfectas) */
  @media (min-width: 701px) {
    .fun-stats-section { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<!-- ====== Screen 1 — Input ====== -->
<div class="screen screen-input active" id="screen-input" aria-label="Ingresa tu fecha de nacimiento">
  <div class="calendar-icon" aria-hidden="true">
    <div class="calendar-icon-top"></div>
    <div class="calendar-icon-body" id="calendar-day">—</div>
  </div>

  <header class="input-header">
    <h1>Vida en Semanas</h1>
    <p>Cada cuadrado representa una semana de tu vida. El tiempo es tu recurso mas valioso. Como lo estas usando?</p>
  </header>

  <form class="form-card" id="config-form" autocomplete="off" spellcheck="false">
    <div class="field">
      <label for="birth-input">Ingresa tu fecha de nacimiento</label>
      <input type="date" id="birth-input" required>
    </div>

    <button type="button" class="btn-primary" id="btn-visualize" disabled>Calcular</button>
  </form>

  <div class="footer-note">
    Version de prueba &middot; V.0.2<br>
    Desarrollado con proposito
  </div>
</div>

<!-- ====== Screen 2 — Results ====== -->
<div class="screen screen-results" id="screen-results" aria-label="Tu calendario de vida">
  <div class="results-top">
    <div>
      <h2 id="results-heading">Tu vida en semanas</h2>
      <p class="user-context" id="results-context"></p>
    </div>
    <button class="btn-back" id="btn-back" aria-label="Volver a editar">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg>
      Editar
    </button>
  </div>

  <div class="stats-row" id="stats-row" aria-label="Resumen numerico"></div>

  <div class="grid-card" id="grid-card">
    <div class="grid-card-header">
      <div>
        <div class="grid-card-title">Cada cuadrado es una semana de tu vida</div>
        <div class="grid-card-subtitle" id="grid-subtitle"></div>
      </div>
    </div>
    <div class="life-grid-wrapper">
      <div class="year-labels" id="year-labels"></div>
      <div class="life-grid" id="life-grid" aria-label="Calendario de vida — cada celda representa una semana"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--fg)"></span> Vividas</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--fg);outline:2px solid var(--fg);outline-offset:2px"></span> Esta semana</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--border)"></span> Por vivir</div>
    </div>
  </div>

  <div class="fun-stats-section" id="fun-stats" aria-label="Datos curiosos de tu vida"></div>
</div>

<script>
(function(){
  'use strict';

  var state = { birthDate: null, lifespan: 80, today: new Date() };

  var $screenInput   = document.getElementById('screen-input');
  var $screenResults = document.getElementById('screen-results');
  var $birthInput    = document.getElementById('birth-input');
  var $btnVisualize  = document.getElementById('btn-visualize');
  var $btnBack       = document.getElementById('btn-back');
  var $calendarDay   = document.getElementById('calendar-day');

  var defaultBirth = new Date();
  defaultBirth.setFullYear(defaultBirth.getFullYear() - 30);
  $birthInput.value = defaultBirth.toISOString().split('T')[0];
  state.today.setHours(0, 0, 0, 0);
  updateCalendarIcon();

  /* ====== Core Math ====== */

  function getDaysFromBirth(birthDate) {
    var ms = state.today.getTime() - birthDate.getTime();
    return Math.max(0, Math.floor(ms / (24 * 60 * 60 * 1000)));
  }

  function getWeeksFromBirth(birthDate) {
    return Math.floor(getDaysFromBirth(birthDate) / 7);
  }

  function getTotalWeeks() { return state.lifespan * 52; }

  function getCurrentWeek(birthDate) { return getWeeksFromBirth(birthDate) + 1; }

  function getYearForWeek(weekNum) { return Math.ceil(weekNum / 52); }

  function validate() {
    var birthVal = $birthInput.value;
    if (!birthVal) return false;
    var parsed = new Date(birthVal + 'T00:00:00');
    if (isNaN(parsed.getTime())) return false;
    if (parsed >= state.today) return false;
    return true;
  }

  function updateButton() { $btnVisualize.disabled = !validate(); }

  function updateCalendarIcon() {
    var d = state.today.getDate();
    $calendarDay.textContent = d;
  }

  /* ====== Fun Life Stats (80 items, show 8 random) ====== */

  var STATS_PER_PAGE = 8;

  function buildAllStats(days, weeks) {
    var hours = days * 24;
    var months = Math.floor(days / 30.44);
    var yearsAprox = Math.floor(days / 365.25);

    return [
      // ===== CUERPO (30) =====
      { icon: '❤️', value: (days * 100000).toLocaleString(), label: 'Tu corazón ha latido aproximadamente {n} veces' },
      { icon: '🩸', value: (days * 12000).toLocaleString() + ' km', label: 'Tu sangre ha recorrido {n} por tus venas' },
      { icon: '🫀', value: (days * 100000 * 0.07).toLocaleString() + ' L', label: 'Tu corazón ha bombeado {n} de sangre' },
      { icon: '🫁', value: (days * 20000).toLocaleString(), label: 'Has respirado alrededor de {n} veces' },
      { icon: '🫧', value: (days * 11000).toLocaleString() + ' L', label: 'Has inhalado y exhalado {n} de aire' },
      { icon: '⚡', value: (days * 60000).toLocaleString(), label: 'Tu cerebro ha procesado aproximadamente {n} pensamientos' },
      { icon: '🔬', value: (days * 86400000).toLocaleString(), label: 'Tus neuronas han disparado {n} senales' },
      { icon: '🧠', value: Math.round(days * 2.5).toLocaleString() + ' GB', label: 'Has generado alrededor de {n} de recuerdos' },
      { icon: '💭', value: (weeks * 7 * 5).toLocaleString(), label: 'Has tenido alrededor de {n} sueños distintos' },
      { icon: '💤', value: (days * 2).toLocaleString() + ' h', label: 'Has pasado {n} horas en sueno REM profundo' },
      { icon: '😴', value: (days * 8).toLocaleString() + ' h', label: 'Has dormido aproximadamente {n} horas' },
      { icon: '👁️', value: (days * 14400).toLocaleString(), label: 'Has parpadeado unas {n} veces' },
      { icon: '👀', value: (days * 8640).toLocaleString(), label: 'Has parpadeado frente a pantallas {n} veces' },
      { icon: '🗣️', value: (days * 16000).toLocaleString(), label: 'Has hablado aproximadamente {n} palabras' },
      { icon: '😊', value: (days * 15).toLocaleString(), label: 'Has sonreido alrededor de {n} veces' },
      { icon: '😢', value: Math.round(days * 1.2).toLocaleString() + ' ml', label: 'Has producido {n} de lágrimas' },
      { icon: '💧', value: (days * 2).toLocaleString() + ' L', label: 'Has bebido aproximadamente {n} de agua' },
      { icon: '💦', value: Math.round(days * 0.5).toLocaleString() + ' L', label: 'Has sudado alrededor de {n}' },
      { icon: '🫧', value: (days * 1).toLocaleString() + ' L', label: 'Has producido {n} de saliva' },
      { icon: '🚰', value: Math.round(days * 180).toLocaleString() + ' L', label: 'Tus rinones han filtrado {n} de sangre' },
      { icon: '🚽', value: Math.floor(days * 1.5).toLocaleString() + ' L', label: 'Has orinado aproximadamente {n}' },
      { icon: '💩', value: Math.round(days * 0.4).toLocaleString() + ' kg', label: 'Tu sistema digestivo ha procesado {n} de desechos' },
      { icon: '💇', value: Math.round(days * 0.035).toLocaleString() + ' m', label: 'Tu cabello ha crecido aproximadamente {n}' },
      { icon: '💅', value: Math.round(days * 0.01).toLocaleString() + ' cm', label: 'Tus unas han crecido aproximadamente {n}' },
      { icon: '🧬', value: (days * 330000000).toLocaleString(), label: 'Tus células se han renovado {n} veces' },
      { icon: '♻️', value: Math.floor(days / 27).toLocaleString(), label: 'Tu piel se ha renovado completamente {n} veces' },
      { icon: '🦴', value: Math.round(days * 0.5).toLocaleString() + ' g', label: 'Tus huesos han regenerado {n} de tejido' },
      { icon: '🦷', value: (days * 1000).toLocaleString(), label: 'Tus dientes han masticado {n} veces' },
      { icon: '💪', value: (days * 2000).toLocaleString() + ' kcal', label: 'Tu cuerpo ha generado {n} de energia' },
      { icon: '🌡️', value: Math.round(days * 86400 * 100 / 1000000).toLocaleString() + ' MJ', label: 'Has irradiado {n} de calor corporal' },

      // ===== PLANETARIO (15) =====
      { icon: '🌍', value: days.toLocaleString(), label: 'La Tierra ha girado {n} veces sobre su eje desde que naciste' },
      { icon: '☀️', value: (days * 2570000).toLocaleString() + ' km', label: 'Has viajado {n} alrededor del Sol' },
      { icon: '🌙', value: Math.floor(days / 29.5).toLocaleString(), label: 'La Luna ha completado {n} órbitas desde que naciste' },
      { icon: '🌌', value: (days * 1750000).toLocaleString() + ' km', label: 'El universo se ha expandido {n} desde tu nacimiento' },
      { icon: '💡', value: (days * 25900000000).toLocaleString() + ' km', label: 'La luz ha viajado {n} desde que naciste' },
      { icon: '🌠', value: (days * 19000000).toLocaleString() + ' km', label: 'La Via Lactea se ha desplazado {n} con vos adentro' },
      { icon: '🌈', value: hours.toLocaleString() + ' h', label: 'Has estado vivo un total de {n}' },
      { icon: '⏱️', value: (days * 86400).toLocaleString(), label: 'Eso son {n} segundos' },
      { icon: '🕐', value: (days * 1440).toLocaleString(), label: 'O {n} minutos, dicho de otra forma' },
      { icon: '📆', value: months.toLocaleString(), label: 'Que equivalen a aproximadamente {n} meses' },
      { icon: '❄️', value: Math.floor(days / 91).toLocaleString(), label: 'Has vivido alrededor de {n} estaciones del año' },
      { icon: '🪐', value: Math.floor(days / 687).toLocaleString(), label: 'En Marte tendrías {n} años de edad' },
      { icon: '🌧️', value: Math.round(days * 2.3).toLocaleString() + ' mm', label: 'Sobre vos cayeron {n} de lluvia acumulada' },
      { icon: '🕳️', value: (days * 220).toLocaleString() + ' km/s', label: 'La galaxia se mueve a 220 km/s, viajaste {n} en total' },
      { icon: '🧲', value: Math.round(days * 700).toLocaleString() + ' N', label: 'La gravedad ha ejercido {n} de fuerza sobre vos' },

      // ===== EXPERIENCIA HUMANA (20) =====
      { icon: '📅', value: weeks.toLocaleString(), label: 'Has vivido {n} fines de semana' },
      { icon: '🌅', value: (weeks * 7).toLocaleString(), label: 'Has visto aproximadamente {n} amaneceres' },
      { icon: '🍽️', value: (days * 3).toLocaleString(), label: 'Has comido alrededor de {n} comidas' },
      { icon: '🍕', value: Math.round(days * 3.5).toLocaleString() + ' kg', label: 'Has ingerido aproximadamente {n} de comida' },
      { icon: '☕', value: Math.floor(days * 1.5).toLocaleString(), label: 'Has tomado alrededor de {n} tazas de cafe' },
      { icon: '🍰', value: Math.floor(days * 0.4).toLocaleString(), label: 'Has disfrutado {n} postres' },
      { icon: '🚿', value: days.toLocaleString(), label: 'Te has duchado aproximadamente {n} veces' },
      { icon: '🪥', value: (days * 2).toLocaleString(), label: 'Has cepillado tus dientes {n} veces' },
      { icon: '✂️', value: Math.floor(weeks / 2).toLocaleString(), label: 'Has cortado tus unas alrededor de {n} veces' },
      { icon: '💇', value: Math.floor(weeks / 12).toLocaleString(), label: 'El peluquero te ha visto {n} veces' },
      { icon: '👣', value: (days * 7500).toLocaleString(), label: 'Has caminado aproximadamente {n} pasos' },
      { icon: '🏃', value: Math.round(days * 7.5).toLocaleString() + ' km', label: 'Has recorrido unos {n} caminando' },
      { icon: '🤗', value: (days * 4).toLocaleString(), label: 'Has dado y recibido {n} abrazos' },
      { icon: '📸', value: (days * 3).toLocaleString(), label: 'Has tomado o salido en {n} fotos' },
      { icon: '📱', value: (days * 80).toLocaleString(), label: 'Has mirado tu telefono {n} veces' },
      { icon: '🎬', value: Math.floor(hours / 2).toLocaleString(), label: 'Podrías haber visto {n} películas' },
      { icon: '🎵', value: (hours * 15).toLocaleString(), label: 'Has escuchado {n} canciones' },
      { icon: '📚', value: Math.floor(weeks / 4).toLocaleString(), label: 'Si leyeras 1 libro por mes habrías leído {n}' },
      { icon: '🚗', value: Math.round(days * 1.2).toLocaleString() + ' h', label: 'Has pasado {n} horas en transporte' },
      { icon: '🛗', value: Math.round(days * 0.3).toLocaleString() + ' h', label: 'Has esperado ascensores {n}' },

      // ===== ABSURDO / COMPARACIONES (15) =====
      { icon: '💰', value: '$' + (days * 86400).toLocaleString(), label: 'Si cobraras $1 por segundo tendrías {n}' },
      { icon: '🩸', value: Math.floor(days * 12000 / 1250).toLocaleString(), label: 'Tu sangre llenaria {n} piscinas olimpicas' },
      { icon: '🌎', value: (Math.round(days * 7.5 / 40000 * 10) / 10).toLocaleString(), label: 'Caminaste {n} vueltas al mundo' },
      { icon: '🐕', value: Math.floor(days / 365.25 * 7).toLocaleString(), label: 'Si fueras perro, tendrías {n} años' },
      { icon: '🥚', value: days.toLocaleString(), label: 'Si fueras gallina habrías puesto {n} huevos' },
      { icon: '🧊', value: Math.round(days * 2 / 0.5).toLocaleString(), label: 'El agua que bebiste llena {n} botellas de medio litro' },
      { icon: '🎈', value: Math.floor(days * 11000 / 14).toLocaleString(), label: 'Tu respiración llenó {n} globos de fiesta' },
      { icon: '🏔️', value: Math.round(days * 3.5 / 5000 * 10) / 10, label: 'Comiste el equivalente a {n} elefantes' },
      { icon: '🚀', value: Math.floor(days * 100000 * 1.3 / 37500000).toLocaleString(), label: 'Tus latidos impulsarian un cohete {n} veces' },
      { icon: '🔋', value: Math.floor(days * 100000 * 1.3 / 3600000).toLocaleString() + ' kWh', label: 'Tu corazón generó {n} de electricidad' },
      { icon: '🧵', value: Math.round(days * 3 * 8 / 1000).toLocaleString() + ' km', label: 'Tus intestinos procesaron {n} de comida' },
      { icon: '📏', value: Math.round(days * 330000000 * 2 / 100000).toLocaleString() + ' km', label: 'Tu ADN desenrollado mediría {n}' },
      { icon: '🪜', value: Math.round(days * 0.035 / 100 * 100) / 100, label: 'Tu cabello mide {n} Torres Eiffel' },
      { icon: '⌚', value: Math.floor(days * 0.25 * 365).toLocaleString() + ' h', label: 'Has pasado {n} viendo publicidad en tu vida' },
      { icon: '💀', value: Math.floor(days / 365.25 / 11).toLocaleString(), label: 'Ya viviste {n} veces la duración de Los Simpsons' }
    ];
  }

  function renderFunStats(days, weeks) {
    var allStats = buildAllStats(days, weeks);
    var shuffled = allStats.slice().sort(function() { return 0.5 - Math.random(); });
    var picked = shuffled.slice(0, STATS_PER_PAGE);
    var container = document.getElementById('fun-stats');
    var html = '';
    picked.forEach(function(s) {
      html +=
        '<div class="fun-stat-card">' +
          '<div class="fun-stat-icon">' + s.icon + '</div>' +
          '<div class="fun-stat-value">' + s.value + '</div>' +
          '<div class="fun-stat-label">' + s.label.replace('{n}', s.value) + '</div>' +
        '</div>';
    });
    container.innerHTML = html;
  }

  /* ====== Render Results ====== */

  function renderResults() {
    var birthVal = $birthInput.value;
    var birthDate = new Date(birthVal + 'T00:00:00');
    var days = getDaysFromBirth(birthDate);
    var lived = getWeeksFromBirth(birthDate);
    var total = getTotalWeeks();
    var pct = total > 0 ? Math.round((lived / total) * 100) : 0;
    var remaining = Math.max(0, total - lived);
    var currentWeek = getCurrentWeek(birthDate);
    var currentYear = getYearForWeek(currentWeek);
    var livedYears = Math.floor(lived / 52);
    var remainingYears = Math.floor(remaining / 52);
    var pctRemaining = total > 0 ? Math.round((remaining / total) * 100) : 0;

    document.getElementById('results-heading').innerHTML = 'Tu vida en <span class="name-highlight">semanas</span>';
    document.getElementById('results-context').textContent =
      state.today.toLocaleDateString('es-AR', { year:'numeric', month:'long', day:'numeric' }) +
      ' · Semana ' + currentWeek.toLocaleString() + ' de ' + total.toLocaleString() +
      ' · Año ' + currentYear;

    // 4 stat cards
    document.getElementById('stats-row').innerHTML =
      '<div class="stat-card">' +
        '<div class="stat-label">Semanas vividas</div>' +
        '<div class="stat-value">' + lived.toLocaleString() + '</div>' +
        '<div class="stat-sub">' + livedYears + ' años</div>' +
      '</div>' +
      '<div class="stat-card">' +
        '<div class="stat-label">Semanas por vivir</div>' +
        '<div class="stat-value">' + remaining.toLocaleString() + '</div>' +
        '<div class="stat-sub">' + remainingYears + ' años estimados</div>' +
      '</div>' +
      '<div class="stat-card">' +
        '<div class="stat-label">Porcentaje vivido</div>' +
        '<div class="stat-value">' + pct + '%</div>' +
        '<div class="stat-sub">' + pctRemaining + '% por delante</div>' +
      '</div>' +
      '<div class="stat-card">' +
        '<div class="stat-label">Semanas totales</div>' +
        '<div class="stat-value">' + total.toLocaleString() + '</div>' +
        '<div class="stat-sub">a ' + state.lifespan + ' años de vida</div>' +
      '</div>';

    // Fun stats
    renderFunStats(days, lived);

    // Grid subtitle
    document.getElementById('grid-subtitle').textContent =
      '52 semanas por año · ' + state.lifespan + ' años · ' + total.toLocaleString() + ' semanas en total';

    // Year labels
    var ylHtml = '';
    for (var y = 1; y <= state.lifespan; y++) {
      var show = y === 1 || y % 5 === 0 || y === state.lifespan;
      ylHtml += '<div class="year-label">' + (show ? y : '') + '</div>';
    }
    document.getElementById('year-labels').innerHTML = ylHtml;

    // Life grid
    var gridHtml = '';
    for (var i = 0; i < total; i++) {
      var cls = 'life-cell';
      if (i === lived) cls += ' current';
      else if (i < lived) cls += ' lived';
      else cls += ' future';
      gridHtml += '<div class="' + cls + '" title="Semana ' + (i + 1) + '"></div>';
    }
    document.getElementById('life-grid').innerHTML = gridHtml;

    // Scroll current week into view
    requestAnimationFrame(function() {
      var currentCell = document.querySelector('.life-cell.current');
      if (currentCell) {
        currentCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  }

  /* ====== Navigation ====== */

  function showScreen(id) {
    $screenInput.classList.remove('active');
    $screenResults.classList.remove('active');
    document.getElementById(id).classList.add('active');
  }

  function goToResults() {
    if (!validate()) return;
    var birthVal = $birthInput.value;
    state.birthDate = new Date(birthVal + 'T00:00:00');
    renderResults();
    showScreen('screen-results');
  }

  function goToInput() { showScreen('screen-input'); updateCalendarIcon(); }
  function goToLifespan() {}

  /* ====== Event Listeners ====== */

  $birthInput.addEventListener('input', updateButton);
  $birthInput.addEventListener('change', updateButton);
  $btnVisualize.addEventListener('click', goToResults);
  $btnBack.addEventListener('click', goToInput);

  document.getElementById('config-form').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !$btnVisualize.disabled) { e.preventDefault(); goToResults(); }
  });

  updateButton();
})();
</script>

</body>
